<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Starlight Synth</title><link rel="stylesheet" href="style.css?v=20260713-focus2"></head><body data-theme="dark">
<header><div class="brand">✦ STARLIGHT SYNTH <span>v1.0</span></div></header>
<main><section class="stage" aria-label="Audio-reactive mathematical constellation"><div class="aura"></div><div id="stars" class="stars"></div></section>
<aside class="panel"><div class="song"><div><small>NOW DREAMING</small><strong id="songName">CELESTIAL LULLABY</strong></div><button id="play" class="play">▶</button></div>
<label>BASS ENGINE<select id="bassStyle"><option value="sub">DEEP SUB</option><option value="acid">ACID RESONANCE</option><option value="pluck">PLUCK BASS</option><option value="fm">FM METAL</option></select></label><label>DRUM KIT<select id="drumKit"><option value="punch">PUNCH MACHINE</option><option value="soft">SOFT DUST</option><option value="glitch">GLITCH BOX</option><option value="space">SPACE KIT</option></select></label><label>ROOT / SCALE<select id="scale"><option value="57">A MINOR</option><option value="60">C MAJOR</option><option value="62">D DORIAN</option><option value="64">E MINOR</option></select></label><label>AMBIENT SYSTEM<select id="ambientMode"><option value="drone">SLOW DRONE · HARMONIC SERIES</option><option value="minimal">GENERATIVE MINIMAL · MARKOV</option><option value="tape">TAPE-HAZE · LFO DRIFT</option><option value="celestial">CELESTIAL · KEPLER ORBITS</option><option value="ocean">OCEAN · GERSTNER WAVES</option><option value="plants">PLANTS · PHYLLOTAXIS</option><option value="mycelium">MYCELIUM · REACTION DIFFUSION</option><option value="tidal">TIDAL · LUNAR HARMONICS</option></select></label><div id="focusControls" class="focus-controls"><label>FOCUS ENVIRONMENT<select id="focusEnvironment"><option value="rain">RAIN</option><option value="beach">BEACH</option><option value="forest">FOREST</option><option value="mountain">MOUNTAIN</option></select></label><div class="nature-layer"><label class="layer-toggle"><input id="birdsEnabled" type="checkbox"> SYNTH BIRDS</label><label>LEVEL <output id="birdVolOut">28%</output><input id="birdVolume" type="range" min="0" max="100" value="28"></label></div><div class="nature-layer"><label class="layer-toggle"><input id="chimesEnabled" type="checkbox"> SYNTH WIND CHIMES</label><label>LEVEL <output id="chimeVolOut">14%</output><input id="chimeVolume" type="range" min="0" max="100" value="14"></label></div><small id="natureStatus">Procedurally generated · changes with every Focus passage</small></div><p id="formula" class="formula">fₙ = f₀ · n — harmonic partial drift</p>
<label>TEMPO <output id="bpmOut">96 BPM</output><input id="bpm" type="range" min="55" max="170" value="96"></label>
<label>GLOW <output id="glowOut">72%</output><input id="glow" type="range" min="15" max="100" value="72"></label>
<label>MUSIC VOLUME <output id="volOut">55%</output><input id="volume" type="range" min="0" max="100" value="55"></label>
<div class="actions"><button id="focusButton">◌ FOCUS LOOP</button><button id="randomAmbient">☾ RANDOM LOOP</button><button id="saveLibrary">＋ SAVE TO LOOP LIBRARY</button><button id="saveLoop">↓ EXPORT 90S FLAC</button></div>
<section class="loop-library" aria-label="Saved loops"><div class="library-head"><span>SAVED LOOPS</span><small id="libraryCount">0 / 10</small></div><div id="libraryItems" class="library-items"></div></section>
<p class="hint" id="status">Choose a star to make it sing.</p><div id="loading" class="loading" aria-live="polite"><i></i><span>CALCULATING NEW UNIVERSE</span></div></aside></main>
<footer><span>MATHEMATICAL AMBIENT ENGINE</span><span>audio-reactive constellation</span><span id="clock"></span></footer><script>
(()=>{
  const block=event=>event.preventDefault();
  ['contextmenu','copy','cut','paste','selectstart','dragstart'].forEach(type=>document.addEventListener(type,block));
  document.addEventListener('keydown',event=>{
    if((event.ctrlKey||event.metaKey)&&['a','c','x','v','u','s'].includes(event.key.toLowerCase()))event.preventDefault();
  });
})();
</script><script src="flac-worker.js?v=20260714-equalpower"></script><script src="engine-v2.js?v=20260714-equalpower"></script><script src="visualizer.js?v=20260714-equalpower"></script></body></html>
