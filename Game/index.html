<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stilling Duty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="app" class="app">
      <div id="begin-overlay" class="begin-overlay">
        <button id="begin-button" class="begin-button" type="button">Begin</button>
      </div>

      <div class="screen-shell">
        <div class="screen-bezel">
          <div class="screen-inner">
            <section id="scene" class="scene" aria-label="Visual novel scene">
              <div id="image-stage" class="image-stage">
                <img id="scene-background" class="scene-background" src="" alt="Scene background" draggable="false" />
                <img id="scene-sprite" class="scene-sprite" src="" alt="Character sprite" draggable="false" />
              </div>

              <div id="dialogue-box" class="dialogue-box">
                <p id="dialogue-speaker" class="dialogue-speaker"></p>
                <p id="dialogue-line" class="dialogue-line"></p>
              </div>
            </section>
          </div>
        </div>
      </div>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
