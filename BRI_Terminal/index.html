<body>
  <div id="bezel">
    <div id="screen">
      <div id="overlay-scanlines"></div>
      <div id="overlay-flicker"></div>
      <div id="overlay-vignette"></div>

      <header id="statusbar">
        <span class="sb-left">BOUNDARY RESEARCH INSTITUTE</span>
        <span class="sb-mid">BRI//SYS v1.12 &middot; CTA-LINK &middot; DE&nbsp;R&Acirc;NE</span>
        <span class="sb-right">
          <span id="hush">HUSH: nominal</span>
          &middot; CLR&nbsp;<span id="clearance">3</span>
          &middot; <span id="clock">--:--:--</span>
        </span>
      </header>

      <main id="out" tabindex="0"></main>

      <footer id="prompt-line">
        <span id="ps1">archive&gt;</span>
        <input id="cmd" autocomplete="off" autocapitalize="off"
               autocorrect="off" spellcheck="false" />
        <span id="caret">&#9608;</span>
      </footer>
    </div>
  </div>

  <script src="archive-content.js?v=events6"></script>
  <script src="data.js?v=events6"></script>
  <script src="terminal.js?v=events6"></script>
